services:
  - type: web
    name: easycite-api
    runtime: node
    plan: starter
    rootDir: .
    buildCommand: npm install && npm run build
    startCommand: npm run start -w apps/api
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: PORT
        value: 10000
      - key: CORS_ORIGIN
        value: "*"
      - key: DOCUMENT_STORE_PATH
        value: ./data/document-store.json
      - key: OPENALEX_EMAIL
        sync: false
